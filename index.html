<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capy & Co – Mystery Box 3D</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:linear-gradient(160deg,#f9f7f4 0%,#f0ece5 40%,#e8e2d8 100%);
  font-family:'Nunito',sans-serif;
  overflow:hidden;height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.header{
  position:absolute;top:32px;text-align:center;z-index:10;pointer-events:none;
}
.header h1{
  font-size:2rem;font-weight:300;color:#4a3628;
  letter-spacing:8px;text-transform:uppercase;
}
.header h1 span{font-weight:800}
.header .sub{
  font-size:.75rem;color:#8faa8b;font-weight:700;
  letter-spacing:4px;margin-top:6px;
}
.header .line{
  width:60px;height:1px;background:#8faa8b;
  margin:10px auto 0;opacity:.5;
}
#c{position:absolute;top:0;left:0;width:100vw;height:100vh}
canvas{display:block;cursor:grab}
canvas:active{cursor:grabbing}
.footer{
  position:absolute;bottom:28px;text-align:center;z-index:10;pointer-events:none;
}
.footer p{font-size:.75rem;color:#7a5c44;opacity:.6;font-weight:400;letter-spacing:2px}
.badge{
  display:inline-block;margin-top:8px;
  border:1px solid #8faa8b;color:#8faa8b;
  padding:5px 20px;border-radius:20px;
  font-size:.65rem;font-weight:700;letter-spacing:3px;
}
.dot{
  position:absolute;border-radius:50%;pointer-events:none;
  opacity:0;animation:fd 8s ease-in-out infinite;
}
@keyframes fd{
  0%{opacity:0;transform:translateY(0) scale(.4)}
  15%{opacity:.35}80%{opacity:.1}
  100%{opacity:0;transform:translateY(-250px) scale(1)}
}
</style>
</head>
<body>
<div class="header">
  <h1><span>Capy</span> & <span>Co</span></h1>
  <div class="sub">MYSTERY SERIES VOL.1</div>
  <div class="line"></div>
</div>
<div id="c"></div>
<div class="footer">
  <p>12cm &times; 12cm &times; 12cm &middot; Premium Blind Box</p>
  <div class="badge">WHICH ONE WILL YOU GET?</div>
</div>
<script>
for(let i=0;i<12;i++){
  const p=document.createElement('div');p.className='dot';
  const sz=Math.random()*6+3;
  const cols=['#7a5c44','#8faa8b','#c4a882','#d4b5a0'];
  p.style.cssText=`width:${sz}px;height:${sz}px;background:${cols[i%4]};`+
    `left:${Math.random()*100}vw;top:${30+Math.random()*50}vh;`+
    `animation-delay:${Math.random()*8}s;animation-duration:${5+Math.random()*5}s`;
  document.body.appendChild(p);
}
</script>

};
const cont=document.getElementById('c');
const scene=new THREE.Scene();
const cam=new THREE.PerspectiveCamera(38,innerWidth/innerHeight,.1,100);
cam.position.set(3.8,2.8,4.8);
cam.lookAt(0,1.15,0);
const R=new THREE.WebGLRenderer({antialias:true,alpha:false});
R.setSize(innerWidth,innerHeight);
R.setPixelRatio(Math.min(devicePixelRatio,2));
R.shadowMap.enabled=true;
R.shadowMap.type=THREE.PCFSoftShadowMap;
R.toneMapping=THREE.ACESFilmicToneMapping;
R.toneMappingExposure=1.15;
R.setClearColor(0xf3ede4,1);
cont.appendChild(R.domElement);

const ctrl=new THREE.OrbitControls(cam,R.domElement);
ctrl.target.set(0,1.15,0);
ctrl.enableDamping=true;ctrl.dampingFactor=0.06;
ctrl.enablePan=false;ctrl.minDistance=3.5;ctrl.maxDistance=9;
ctrl.maxPolarAngle=Math.PI*.72;ctrl.minPolarAngle=Math.PI*.18;
ctrl.autoRotate=true;ctrl.autoRotateSpeed=1.2;

scene.add(new THREE.AmbientLight(0xfff8f0,0.55));
const sun=new THREE.DirectionalLight(0xffffff,0.85);
sun.position.set(5,9,5);sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.near=.5;sun.shadow.camera.far=25;
sun.shadow.camera.left=-5;sun.shadow.camera.right=5;
sun.shadow.camera.top=5;sun.shadow.camera.bottom=-5;
sun.shadow.bias=-.001;scene.add(sun);
scene.add(new THREE.DirectionalLight(0xf5efe6,0.3)).position.set(-4,5,-3);
scene.add(new THREE.DirectionalLight(0xb5ccb1,0.18)).position.set(0,3,-6);
scene.add(new THREE.HemisphereLight(0xf9f7f4,0x7a5c44,0.2));

const L=new THREE.TextureLoader();
function lt(u){return new Promise(r=>L.load(u,t=>{t.encoding=THREE.sRGBEncoding;t.anisotropy=R.capabilities.getMaxAnisotropy();r(t)}))}

Promise.all([lt(T.right),lt(T.left),lt(T.top),lt(T.bottom),lt(T.front),lt(T.back)])
.then(tex=>{
  const mats=tex.map(t=>new THREE.MeshStandardMaterial({map:t,roughness:0.6,metalness:0.0}));
  const geo=new THREE.BoxGeometry(2,2,2);
  const box=new THREE.Mesh(geo,mats);
  box.castShadow=true;box.receiveShadow=true;box.position.y=1.15;
  scene.add(box);
  box.add(new THREE.LineSegments(
    new THREE.EdgesGeometry(geo),
    new THREE.LineBasicMaterial({color:0x7a5c44,transparent:true,opacity:0.12})
  ));
  const gnd=new THREE.Mesh(new THREE.PlaneGeometry(20,20),new THREE.ShadowMaterial({opacity:0.1}));
  gnd.rotation.x=-Math.PI/2;gnd.receiveShadow=true;scene.add(gnd);
  const plat=new THREE.Mesh(
    new THREE.RingGeometry(0,2.8,64),
    new THREE.MeshStandardMaterial({color:0xe8e2d8,roughness:0.95,metalness:0,transparent:true,opacity:0.35})
  );
  plat.rotation.x=-Math.PI/2;plat.position.y=.005;plat.receiveShadow=true;scene.add(plat);

  let t=0;
  !function anim(){
    requestAnimationFrame(anim);t+=.008;
    box.position.y=1.15+Math.sin(t*1.1)*.05;
    ctrl.update();R.render(scene,cam);
  }();
});

addEventListener('resize',()=>{
  cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();
  R.setSize(innerWidth,innerHeight);
});
let it;
ctrl.addEventListener('start',()=>{ctrl.autoRotate=false;clearTimeout(it)});
ctrl.addEventListener('end',()=>{it=setTimeout(()=>ctrl.autoRotate=true,3000)});
</script>
