<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capy & Co Mystery Box - 3D Mockup</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: linear-gradient(135deg, #f5f0e8 0%, #e8ddd0 50%, #f0e8dc 100%);
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .title-area {
    position: absolute;
    top: 30px;
    text-align: center;
    z-index: 10;
    pointer-events: none;
  }

  .title-area h1 {
    font-size: 2.4rem;
    font-weight: 800;
    color: #6b4226;
    text-shadow: 0 2px 8px rgba(107,66,38,0.12);
    margin-bottom: 6px;
    letter-spacing: 1px;
  }

  .title-area p {
    font-size: 1rem;
    color: #4a7c59;
    font-weight: 700;
    letter-spacing: 2px;
  }

  #canvas-container {
    width: 100vw;
    height: 100vh;
    position: absolute;
    top: 0;
    left: 0;
  }

  canvas {
    display: block;
    cursor: grab;
  }
  canvas:active {
    cursor: grabbing;
  }

  .footer {
    position: absolute;
    bottom: 25px;
    text-align: center;
    z-index: 10;
    pointer-events: none;
  }

  .footer p {
    font-size: 0.85rem;
    color: #6b4226aa;
    font-weight: 600;
  }

  .badge {
    display: inline-block;
    background: #4a7c59;
    color: #f5f0e8;
    padding: 6px 18px;
    border-radius: 20px;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 1px;
    margin-top: 8px;
  }

  /* Floating particles */
  .particle {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    opacity: 0;
    animation: floatUp 6s ease-in-out infinite;
  }

  @keyframes floatUp {
    0% { opacity: 0; transform: translateY(0) scale(0.5); }
    20% { opacity: 0.6; }
    80% { opacity: 0.3; }
    100% { opacity: 0; transform: translateY(-200px) scale(1.2); }
  }
</style>
</head>
<body>

<div class="title-area">
  <h1>Capy & Co Mystery Box</h1>
  <p>DRAG TO ROTATE</p>
</div>

<div id="canvas-container"></div>

<div class="footer">
  <p>12cm &times; 12cm &times; 12cm &mdash; Blind Box Packaging</p>
  <span class="badge">COLLECT THEM ALL!</span>
</div>

<!-- Floating particles -->
<script>
  for (let i = 0; i < 15; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 8 + 4;
    const colors = ['#6b4226', '#4a7c59', '#d4884a', '#c9a96e'];
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.left = Math.random() * 100 + 'vw';
    p.style.top = (Math.random() * 60 + 30) + 'vh';
    p.style.animationDelay = Math.random() * 6 + 's';
    p.style.animationDuration = (Math.random() * 4 + 4) + 's';
    document.body.appendChild(p);
  }
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

// ── Scene setup ──
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(3.5, 2.5, 4.5);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
container.appendChild(renderer.domElement);

// ── Controls ──
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.enablePan = false;
controls.minDistance = 3;
controls.maxDistance = 10;
controls.maxPolarAngle = Math.PI * 0.75;
controls.minPolarAngle = Math.PI * 0.15;
controls.autoRotate = true;
controls.autoRotateSpeed = 1.5;

// ── Lighting ──
const ambientLight = new THREE.AmbientLight(0xfff5e6, 0.5);
scene.add(ambientLight);

const mainLight = new THREE.DirectionalLight(0xffffff, 0.9);
mainLight.position.set(5, 8, 5);
mainLight.castShadow = true;
mainLight.shadow.mapSize.width = 2048;
mainLight.shadow.mapSize.height = 2048;
mainLight.shadow.camera.near = 0.5;
mainLight.shadow.camera.far = 30;
mainLight.shadow.camera.left = -5;
mainLight.shadow.camera.right = 5;
mainLight.shadow.camera.top = 5;
mainLight.shadow.camera.bottom = -5;
mainLight.shadow.bias = -0.001;
scene.add(mainLight);

const fillLight = new THREE.DirectionalLight(0xffe4c4, 0.35);
fillLight.position.set(-3, 4, -2);
scene.add(fillLight);

const rimLight = new THREE.DirectionalLight(0xadd8a6, 0.2);
rimLight.position.set(0, 2, -5);
scene.add(rimLight);

// Subtle hemisphere light for natural feel
const hemiLight = new THREE.HemisphereLight(0xf5f0e8, 0x6b4226, 0.25);
scene.add(hemiLight);

// ── Load textures and create box ──
const loader = new THREE.TextureLoader();
const texPromises = [];

function loadTex(url) {
  return new Promise((resolve) => {
    loader.load(url, (tex) => {
      tex.encoding = THREE.sRGBEncoding;
      tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
      resolve(tex);
    });
  });
}

Promise.all([
  loadTex(textureData.right),   // +X
  loadTex(textureData.left),    // -X
  loadTex(textureData.top),     // +Y
  loadTex(textureData.bottom),  // -Y
  loadTex(textureData.front),   // +Z
  loadTex(textureData.back),    // -Z
]).then((textures) => {

  const materials = textures.map(tex => new THREE.MeshStandardMaterial({
    map: tex,
    roughness: 0.55,
    metalness: 0.0,
  }));

  // Box geometry (cube)
  const geometry = new THREE.BoxGeometry(2, 2, 2);

  // Round edges slightly with a bevel effect using edge lines
  const box = new THREE.Mesh(geometry, materials);
  box.castShadow = true;
  box.receiveShadow = true;
  box.position.y = 1.1;
  scene.add(box);

  // Edge lines for a subtle cardboard look
  const edges = new THREE.EdgesGeometry(geometry);
  const lineMat = new THREE.LineBasicMaterial({ color: 0x5a3520, linewidth: 1, transparent: true, opacity: 0.35 });
  const wireframe = new THREE.LineSegments(edges, lineMat);
  box.add(wireframe);

  // ── Ground plane (shadow catcher) ──
  const groundGeo = new THREE.PlaneGeometry(20, 20);
  const groundMat = new THREE.ShadowMaterial({ opacity: 0.15 });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = 0;
  ground.receiveShadow = true;
  scene.add(ground);

  // Visible ground circle (subtle platform)
  const platformGeo = new THREE.CircleGeometry(2.5, 64);
  const platformMat = new THREE.MeshStandardMaterial({
    color: 0xe8ddd0,
    roughness: 0.9,
    metalness: 0.0,
    transparent: true,
    opacity: 0.5,
  });
  const platform = new THREE.Mesh(platformGeo, platformMat);
  platform.rotation.x = -Math.PI / 2;
  platform.position.y = 0.01;
  platform.receiveShadow = true;
  scene.add(platform);

  // ── Gentle hover animation ──
  let time = 0;
  function animate() {
    requestAnimationFrame(animate);
    time += 0.01;

    // Gentle floating motion
    box.position.y = 1.1 + Math.sin(time * 1.2) * 0.06;
    box.rotation.y += 0.0003; // very subtle spin on top of OrbitControls auto-rotate

    controls.update();
    renderer.render(scene, camera);
  }

  animate();
});

// ── Responsive ──
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── Pause auto-rotate when user interacts ──
let interactionTimer;
controls.addEventListener('start', () => {
  controls.autoRotate = false;
  clearTimeout(interactionTimer);
});
controls.addEventListener('end', () => {
  interactionTimer = setTimeout(() => {
    controls.autoRotate = true;
  }, 2500);
});
</script>
